{% extends 'events/base.html' %}

{% block content %}
    <h2>Create Your Account 🚀</h2>
    <p style="color: #666; margin-bottom: 20px;">Join us to register for symposium events.</p>

    <form method="POST" style="margin-top:20px;">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <br>
        <button type="submit" class="btn btn-success">Sign Up & Register</button>
    </form>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd;">
    <p>Already have an account? <a href="{% url 'login' %}" style="color: #3498db; text-decoration: none; font-weight: bold;">Login here</a></p>
{% endblock %}
