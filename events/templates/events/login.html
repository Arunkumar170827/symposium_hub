{% extends 'events/base.html' %}
{% block content %}
    <h2>Login Access</h2>
    <form method="POST" style="margin-top:20px;">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary" style="margin-top:15px;">Login</button>
    </form>
    <p style="margin-top:15px;">New user? <a href="{% url 'signup' %}">Create an account here</a></p>
{% endblock %}
